name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-script-tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Check TypeScript
        run: npm run check:types

      - name: Run JavaScript tests
        run: npm test

      - name: Compile Bicep runtime
        run: |
          az bicep install --version v0.45.15
          az bicep build --file infra/main.bicep --outfile /tmp/runtime-template.json
          cmp site/runtime-template.json /tmp/runtime-template.json

      - name: Build runtime container
        run: docker build --file Dockerfile.runtime --tag after-party-runtime:test .

      - name: Run shell script tests
        run: bash tests/shell-scripts.sh
