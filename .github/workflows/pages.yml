name: GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write
  pages: write

jobs:
  deploy:
    name: Deploy production site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build and publish the commit-pinned runtime
        id: runtime
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}/runtime"
          tag="$image:$GITHUB_SHA"
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker build --file Dockerfile.runtime --tag "$tag" .
          docker push "$tag"
          docker image rm "$tag"
          docker logout ghcr.io
          docker pull "$tag"
          runtime_image=$(docker image inspect --format '{{index .RepoDigests 0}}' "$tag")
          case "$runtime_image" in
            "$image@sha256:"????????????????????????????????????????????????????????????????) ;;
            *) echo "Runtime image did not resolve to one digest" >&2; exit 1 ;;
          esac
          echo "image=$runtime_image" >> "$GITHUB_OUTPUT"

      - name: Build the site
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          node scripts/build-pages.mjs \
            --source site \
            --output dist \
            --commit "$GITHUB_SHA" \
            --base-path "/$repository_name/" \
            --runtime-image "${{ steps.runtime.outputs.image }}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload the site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
